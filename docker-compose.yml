services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms
      POSTGRES_DB: qms
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://qms:qms@postgres:5432/qms
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FLASK_APP: app:create_app
    ports:
      - "8000:8000"
    command: sh -c "flask db upgrade && gunicorn -w 4 -b 0.0.0.0:8000 'app:create_app()'"

  mqtt-bridge:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
      app:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://qms:qms@postgres:5432/qms
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FLASK_APP: app:create_app
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
    restart: unless-stopped
    command: flask mqtt-bridge

  trigger-worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://qms:qms@postgres:5432/qms
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FLASK_APP: app:create_app
      WORKER_NAME: trigger-worker-1
    restart: unless-stopped
    command: flask trigger-worker

volumes:
  pgdata:
